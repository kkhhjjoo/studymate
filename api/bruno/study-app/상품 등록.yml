info:
  name: 상품 등록
  type: http
  seq: 5

http:
  method: POST
  url: "{{url}}/seller/products/"
  headers:
    - name: client-id
      value: "{{client-id}}"
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
          "name": "AWS 자격증 준비 스터디",
          "content":
            "AWS Solutions Architect Associate 자격증 취득을 목표로 하는 스터디입니다. 공식 학습 자료와 모의고사를 함께 풀며 준비합니다.",
          "price": 0,
          "quantity": 4,
          "shippingFees": 0,
          "mainImages": ["/images/aws-study.jpg"],
          "show": true,
          "extra": { "category": "자격증", "tags": ["AWS", "Cloud"] }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
