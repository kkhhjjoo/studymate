info:
  name: 상품 등록
  type: http
  seq: 4

http:
  method: POST
  url: "{{url}}/seller/products/"
  headers:
    - name: Authorization
      value: Bearer {{accessToken}}
  body:
    type: json
    data: |-
      {
        "name":"UI/UX 디자인",
      "content":"피그마로 UI/UX디자인해요~",
